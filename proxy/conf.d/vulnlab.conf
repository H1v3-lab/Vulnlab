# ─────────────────────────────────────────────
# Dashboard principal  →  http://localhost/
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Root global — dashboard statique
    root /usr/share/nginx/html;
    index index.html;

    # Dashboard principal → http://localhost/
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── C01 — SQLi ─────────────────────────────
    location /c01/ {
        proxy_pass         http://c01-sqli:80/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect     off;
    }

    # ── C02 — XSS ──────────────────────────────
    location /c02/ {
        proxy_pass         http://c02-xss:3000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect     off;
    }

    # ── C03 — SSTI ─────────────────────────────
    location /c03/ {
        proxy_pass         http://c03-ssti:5000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }

    # ── C04 — Broken Auth ──────────────────────
    location /c04/ {
        proxy_pass         http://c04-broken-auth:80/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }

    # ── C05 — Brute Force ──────────────────────
    location /c05/ {
        proxy_pass         http://c05-brute:3000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }

    # ── C06 — IDOR Auth ────────────────────────
    location /c06/ {
        proxy_pass         http://c06-idor-auth:5000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }

    # ── C07 — File Upload ──────────────────────
    location /c07/uploads/ {
        proxy_pass         http://c07-upload:80/uploads/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }
    location /c07/ {
        proxy_pass         http://c07-upload:80/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        client_max_body_size 10M;
        proxy_redirect     off;
    }

    # ── C08 — LFI / RFI ────────────────────────
    location /c08/ {
        proxy_pass         http://c08-lfi:80/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }

    # ── C09 — Weak Crypto ──────────────────────
    location /c09/ {
        proxy_pass         http://c09-crypto:5000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }

    # ── C10 — JWT Forgery ──────────────────────
    location /c10/ {
        proxy_pass         http://c10-jwt:3000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }

    # ── C11 — SSRF ─────────────────────────────
    location /c11/ {
        proxy_pass         http://c11-ssrf:5000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }

    # ── C12 — XXE ──────────────────────────────
    location /c12/ {
        proxy_pass         http://c12-xxe:5000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }

    # ── C13 — IDOR API ─────────────────────────
    location /c13/ {
        proxy_pass         http://c13-idor:3000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }

    # ── C14 — CSRF ─────────────────────────────
    location /c14/ {
        proxy_pass         http://c14-csrf:80/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }

    # ── C15 — Command Injection ─────────────────
    location /c15/ {
        proxy_pass         http://c15-cmdi:5000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_redirect     off;
    }
}
